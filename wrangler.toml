name = "brp-platform-worker"
main = "packages/worker/src/index.ts"
compatibility_date = "2026-04-13"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "brp-platform"
database_id = "00000000-0000-0000-0000-000000000001"

[[kv_namespaces]]
binding = "DOMAIN_MAP"
id = ""  # Set after: wrangler kv namespace create DOMAIN_MAP

[vars]
JWT_SECRET = "dev-only-change-me"
